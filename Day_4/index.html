<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header class="header">
                <h1>Group Idea Board</h1>
                <button id="manage-members-btn" title="Manage Group Members">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="17" y1="11" x2="23" y2="11"></line></svg>
                </button>
            </header>

            <section class="input-section">
                <div class="input-row">
                    <select id="member-select" class="glass-input">
                        <option value="" disabled selected>Select your name...</option>
                    </select>
                    <input type="text" id="idea-input" placeholder="Enter your idea here..." class="glass-input">
                    <div class="button-group">
                        <button id="add-idea-btn" class="primary-btn">Add Idea</button>
                        <button id="clear-input-btn" class="glass-btn secondary" title="Clear Inputs">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
            </section>

            <div class="stats-section">
                <span id="total-ideas-counter">Total Ideas: 0</span>
            </div>

            <hr class="divider">

            <section class="content-area">
                <ul id="idea-list">
                    <!-- Ideas will be injected here -->
                    <li class="empty-state">No ideas yet. Be the first to share!</li>
                </ul>
            </section>
        </div>
    </main>

    <!-- Member Management Modal -->
    <div id="member-modal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Manage Members</h2>
                <button id="close-modal">&times;</button>
            </div>
            <div class="member-add-row">
                <input type="text" id="new-member-input" placeholder="New member name..." class="glass-input">
                <button id="save-member-btn" class="primary-btn">Add Member</button>
            </div>
            <ul id="modal-member-list"></ul>
        </div>
    </div>

    <footer class="footer">
        <div class="glass-footer">
            <p>Project by Group 17</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
